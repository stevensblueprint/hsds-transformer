name: Transformer Unit Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Requirements
        run: |
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/ -v
